<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HMS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --p1: #74057a; --p2: #b10ac1; --p3: #d966e8; --p4: #f0c0f5;
    --accent: #22de09; --bg: #0d000f; --card: #1e0022;
    --border: rgba(177,10,193,0.25); --text: #f5e6f7; --muted: #9d7fa3;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(116,5,122,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 90% 80%, rgba(177,10,193,0.2) 0%, transparent 60%);
    pointer-events: none;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; width: 380px;
  }
  .brand {
    font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
    color: var(--p3); margin-bottom: 8px;
  }
  .brand span { color: var(--accent); }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-group label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input {
    background: #160018; border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border 0.2s;
  }
  .form-group input:focus { border-color: var(--p2); }
  .btn-primary {
    width: 100%; margin-top: 8px;
    background: linear-gradient(135deg, var(--p1), var(--p2));
    border: none; border-radius: 9px; padding: 13px;
    color: white; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .error {
    background: rgba(255,77,109,0.12); border: 1px solid rgba(255,77,109,0.3);
    color: #ff6b85; border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-top: 12px; display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">HMS <span>Portal</span></div>
  <div class="subtitle">Sign in to access patient records</div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password"/>
  </div>

  <button class="btn-primary" onclick="login()">Sign In</button>
  <div class="error" id="error-msg">Invalid username or password.</div>
</div>

<script>
  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (!res.ok) {
        document.getElementById('error-msg').classList.add('show');
        return;
      }

      const data = await res.json();
      sessionStorage.setItem('token', data.token);
      sessionStorage.setItem('role', data.role);
      window.location.href = '/index.html';

    } catch (err) {
      document.getElementById('error-msg').classList.add('show');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
